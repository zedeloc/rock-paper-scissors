<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
  </head>
  <body>
    <script>
      function computerPlay() {
        let rps = ['rock', 'paper', 'scissors'];
        let computerChoice = rps[Math.floor(Math.random() * 3)];
        console.log(computerChoice);
        return computerChoice;
      }

      function playerPlay() {
        return prompt("Rock, Paper, or Scissors?").toLocaleLowerCase();
      }

      function game(computerPlay, playerPlay) {
        if (computerPlay === 'rock') {
          if (playerPlay === 'rock') {
            console.log('Draw!');
          } else {
            (playerPlay === 'paper') ?
            console.log('You win! Paper beats rock!') : console.log('You Lose. Rock beats Scissors!');
          }
        } else if (computerPlay === 'paper') {
          if (playerPlay === 'paper') {
            console.log('Draw!');
          } else {
            (playerPlay === 'scissors') ?
            console.log('You Win! Scissors beats paper.'): console.log('You Lose. Paper beats Rock.');
          }
        }else if (computerPlay === 'scissors') {
          if (playerPlay === 'scissors') {
            console.log('Draw!');
          } else {
            (playerPlay === 'rock') ?
            console.log('You Win! Rock beats Scissors') : console.log('You lose. Scissors beats paper!');
          }
        }
      }
      
      game(computerPlay(), playerPlay());
    </script>
  </body>
</html>
