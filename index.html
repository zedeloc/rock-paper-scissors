<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function getComputerChoice() {
            const RPS = ['rock', 'paper', 'scissors'];
            const getRanNum = Math.floor(Math.random() * 3);
            return RPS[getRanNum];
        }

        function getPlayerChoice() {
            let playerChoice = prompt("Choose Rock, Paper, or Scissors: ").trim().toLowerCase();
            
            if (playerChoice === "rock"
            || playerChoice === "paper"
            || playerChoice === "scissors") {
                return playerChoice;
            } else {
                alert("You may have made a spelling error");
                return getPlayerChoice();
            }  
        }

        function evaluatePlayerVsComputer(player, computer){
            if (player === computer) {
                return undefined;
            } else if (player === "rock") {
                if (computer === "paper") {
                    return false ;
                } else {
                    return true;
                }
            } else if (player === "paper") {
                if (computer === "rock") {
                    return true ; 
                } else {
                    return false;
                }
            } else if (player === "scissors") {
                if (computer === "rock") {
                    return false;
                }else {
                    return true;
                }
            }
        }

        function rockPaperScissors() {
            const player = getPlayerChoice();
            const computer = getComputerChoice();

            console.log(`You chose: ${player}...\nComputer chose: ${computer}\n\nEvaluating...`);
            
            if (evaluatePlayerVsComputer(player, computer) === undefined) {
                console.log("Tie\n... COMMENCING REDO SEQUENCE");
                rockPaperScissors();
            } else if (evaluatePlayerVsComputer(player, computer) === true) {
                console.log(`You win!!!\n${player} beats ${computer}!!!`);
            } else if (evaluatePlayerVsComputer(player, computer) === false) {
                console.log(`You lose!!!\n${computer} beats ${player}!!!`);
            }
        }

        function game() {
            for (let i = 0; i < 5; i++){
                rockPaperScissors();
            }
        }

        game();

    </script>
</body>
</html>
