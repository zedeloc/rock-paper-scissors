<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
  </head>
  <body>
    <script>
      function computerPlay() {
        // generates and returns a random choice between 'rock'
        // 'paper', and 'scissors'
        let rps = ['rock', 'paper', 'scissors'];
        let computerChoice = rps[Math.floor(Math.random() * 3)];
        return computerChoice;
      }

      function playerPlay() {
        // prompts for user choice between 'rock', 'paper', 
        // 'scissors' and returns value
        return prompt("Rock, Paper, or Scissors?").toLocaleLowerCase();
      }

      function evaluateRPS(computerMove, playerMove) {
        // evaluates who wins in a round of Rock Paper Scissors
        // console.log()'s moves and returns 'computer', 'player', 
        // or 'draw'

        console.log(`Player: ${playerMove}. Computer: ${computerMove}`)
        if (computerMove === 'rock') {
          if (playerMove === 'rock') {
            return 'draw';
          } else {
            return (playerMove === 'paper') ?
            'player' : 'computer';
          }
        } else if (computerMove === 'paper') {
          if (playerMove === 'paper') {
            return 'draw';
          } else {
            return (playerMove === 'scissors') ?
            'player.' : 'computer';
          }
        } else if (computerMove === 'scissors') {
          if (playerMove === 'scissors') {
            return 'draw';
          } else {
            return (playerMove === 'rock') ?
            'player' : 'computer';
          }
        }
      }

      function game() {
        // manages game of rock paper scissors
        let playerScore = 0;
        let computerScore = 0;
        let drawCount = 0;

        for (let i = 0; i < 5; i++) {
          let computerMove = computerPlay();
          let playerMove = playerPlay();
          let result = evaluateRPS(computerMove, playerMove);
          if (result === 'draw') {
            ++drawCount;
            console.log(result);
          } else if (result == 'player') {
            ++playerScore;
            console.log(`${result} wins! ${playerMove} beats ${computerMove}.`);
          } else {
            ++computerScore;
            console.log(`${result} wins! ${computerMove} beats ${playerMove}.`);
          }
          console.log(`Player: ${playerScore} Computer: ${computerScore} Draws: ${drawCount}`);
        }
      }
      game();
    </script>
  </body>
</html>
